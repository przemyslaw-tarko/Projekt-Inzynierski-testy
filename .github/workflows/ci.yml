name: CI

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      selenium: ${{ steps.filter.outputs.selenium }}
      cypress: ${{ steps.filter.outputs.cypress }}
      playwright: ${{ steps.filter.outputs.playwright }}
      shared: ${{ steps.filter.outputs.shared }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.SUBMODULES_TOKEN || github.token }}

      - name: Detect changes
        id: filter
        uses: dorny/paths-filter@v3
        with:
          list-files: shell
          filters: |
            selenium:
              - 'tests/selenium/**'
            cypress:
              - 'tests/cypress/**'
            playwright:
              - 'tests/playwright/**'
            shared:
              - 'scripts/**'
              - 'apps/bookstore/**'
              - 'apps/test-bookstore'
              - 'apps/test-bookstore/**'
              - 'docker-compose.tests.yml'
              - 'package.json'
              - 'package-lock.json'
              - '.gitmodules'

  lint:
    runs-on: ubuntu-latest
    needs: [changes]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.SUBMODULES_TOKEN || github.token }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Lint
        run: npm run lint

      - name: Validate docker compose
        run: docker compose -f apps/bookstore/docker-compose.yml -f docker-compose.tests.yml config > /dev/null

  tests-selenium:
    runs-on: ubuntu-latest
    needs: [lint, changes]
    if: needs.changes.outputs.selenium == 'true' || needs.changes.outputs.shared == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.SUBMODULES_TOKEN || github.token }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'

      - name: Install dependencies
        run: npm install

      - name: Start app
        run: node scripts/compose.js app up -d

      - name: Wait for app
        run: node scripts/wait-for-app.js

      - name: Run Selenium tests
        env:
          TESTRAIL_ENABLED: ${{ secrets.TESTRAIL_ENABLED || 'false' }}
        run: node scripts/run-selenium.js

      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: reports-selenium
          path: reports/selenium
          if-no-files-found: warn

      - name: Teardown
        if: always()
        run: node scripts/compose.js all down --remove-orphans || true

  tests-cypress:
    runs-on: ubuntu-latest
    needs: [lint, changes]
    if: needs.changes.outputs.cypress == 'true' || needs.changes.outputs.shared == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.SUBMODULES_TOKEN || github.token }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'

      - name: Install dependencies
        run: npm install

      - name: Start app
        run: node scripts/compose.js app up -d

      - name: Wait for app
        run: node scripts/wait-for-app.js

      - name: Run Cypress tests
        env:
          TESTRAIL_ENABLED: ${{ secrets.TESTRAIL_ENABLED || 'false' }}
        run: node scripts/compose.js all run --rm cypress-tests

      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: reports-cypress
          path: reports/cypress
          if-no-files-found: warn

      - name: Teardown
        if: always()
        run: node scripts/compose.js all down --remove-orphans || true

  tests-playwright:
    runs-on: ubuntu-latest
    needs: [lint, changes]
    if: needs.changes.outputs.playwright == 'true' || needs.changes.outputs.shared == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.SUBMODULES_TOKEN || github.token }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'

      - name: Install dependencies
        run: npm install

      - name: Start app
        run: node scripts/compose.js app up -d

      - name: Wait for app
        run: node scripts/wait-for-app.js

      - name: Run Playwright tests
        env:
          TESTRAIL_ENABLED: ${{ secrets.TESTRAIL_ENABLED || 'false' }}
        run: node scripts/compose.js all run --rm playwright-tests

      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: reports-playwright
          path: reports/playwright
          if-no-files-found: warn

      - name: Teardown
        if: always()
        run: node scripts/compose.js all down --remove-orphans || true

  testrail-selenium:
    runs-on: ubuntu-latest
    needs: [changes, tests-selenium]
    if: always() && (needs.changes.outputs.selenium == 'true' || needs.changes.outputs.shared == 'true')
    env:
      TESTRAIL_ENABLED: ${{ secrets.TESTRAIL_ENABLED || 'false' }}
    steps:
      - name: Checkout
        if: env.TESTRAIL_ENABLED == 'true'
        uses: actions/checkout@v4

      - name: Download Selenium reports
        if: env.TESTRAIL_ENABLED == 'true'
        uses: actions/download-artifact@v4
        with:
          name: reports-selenium
          path: reports-selenium

      - name: Verify Selenium JUnit report exists
        if: env.TESTRAIL_ENABLED == 'true'
        run: test -f reports-selenium/junit/results.xml

      - name: Validate Selenium JUnit XML
        if: env.TESTRAIL_ENABLED == 'true'
        run: |
          python - <<'PY'
          import xml.etree.ElementTree as ET
          ET.parse("reports-selenium/junit/results.xml")
          print("Selenium XML OK")
          PY

      - name: Setup Python
        if: env.TESTRAIL_ENABLED == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install trcli
        if: env.TESTRAIL_ENABLED == 'true'
        run: python -m pip install --upgrade pip trcli

      - name: Upload Selenium report to TestRail
        if: env.TESTRAIL_ENABLED == 'true'
        env:
          TESTRAIL_URL: ${{ secrets.TESTRAIL_URL }}
          TESTRAIL_USER: ${{ secrets.TESTRAIL_USER }}
          TESTRAIL_API_KEY: ${{ secrets.TESTRAIL_API_KEY }}
        run: |
          trcli -y \
            -h "$TESTRAIL_URL" \
            --project "Projekt-Inzynierski-testy" \
            --username "$TESTRAIL_USER" \
            --password "$TESTRAIL_API_KEY" \
            parse_junit \
            --case-matcher "name" \
            --title "Selenium | PR #${{ github.event.pull_request.number }} | Run #${{ github.run_number }}" \
            -f "reports-selenium/junit/results.xml"

  testrail-cypress:
    runs-on: ubuntu-latest
    needs: [changes, tests-cypress]
    if: always() && (needs.changes.outputs.cypress == 'true' || needs.changes.outputs.shared == 'true')
    env:
      TESTRAIL_ENABLED: ${{ secrets.TESTRAIL_ENABLED || 'false' }}
    steps:
      - name: Checkout
        if: env.TESTRAIL_ENABLED == 'true'
        uses: actions/checkout@v4

      - name: Download Cypress reports
        if: env.TESTRAIL_ENABLED == 'true'
        uses: actions/download-artifact@v4
        with:
          name: reports-cypress
          path: reports-cypress

      - name: Verify Cypress JUnit report exists
        if: env.TESTRAIL_ENABLED == 'true'
        run: test -f reports-cypress/junit/results.xml

      - name: Validate Cypress JUnit XML
        if: env.TESTRAIL_ENABLED == 'true'
        run: |
          python - <<'PY'
          import xml.etree.ElementTree as ET
          ET.parse("reports-cypress/junit/results.xml")
          print("Cypress XML OK")
          PY

      - name: Setup Python
        if: env.TESTRAIL_ENABLED == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install trcli
        if: env.TESTRAIL_ENABLED == 'true'
        run: python -m pip install --upgrade pip trcli

      - name: Upload Cypress report to TestRail
        if: env.TESTRAIL_ENABLED == 'true'
        env:
          TESTRAIL_URL: ${{ secrets.TESTRAIL_URL }}
          TESTRAIL_USER: ${{ secrets.TESTRAIL_USER }}
          TESTRAIL_API_KEY: ${{ secrets.TESTRAIL_API_KEY }}
        run: |
          trcli -y \
            -h "$TESTRAIL_URL" \
            --project "Projekt-Inzynierski-testy" \
            --username "$TESTRAIL_USER" \
            --password "$TESTRAIL_API_KEY" \
            parse_junit \
            --case-matcher "name" \
            --title "Cypress | PR #${{ github.event.pull_request.number }} | Run #${{ github.run_number }}" \
            -f "reports-cypress/junit/results.xml"

  testrail-playwright:
    runs-on: ubuntu-latest
    needs: [changes, tests-playwright]
    if: always() && (needs.changes.outputs.playwright == 'true' || needs.changes.outputs.shared == 'true')
    env:
      TESTRAIL_ENABLED: ${{ secrets.TESTRAIL_ENABLED || 'false' }}
    steps:
      - name: Checkout
        if: env.TESTRAIL_ENABLED == 'true'
        uses: actions/checkout@v4

      - name: Download Playwright reports
        if: env.TESTRAIL_ENABLED == 'true'
        uses: actions/download-artifact@v4
        with:
          name: reports-playwright
          path: reports-playwright

      - name: Verify Playwright JUnit report exists
        if: env.TESTRAIL_ENABLED == 'true'
        run: test -f reports-playwright/junit/results.xml

      - name: Validate Playwright JUnit XML
        if: env.TESTRAIL_ENABLED == 'true'
        run: |
          python - <<'PY'
          import xml.etree.ElementTree as ET
          ET.parse("reports-playwright/junit/results.xml")
          print("Playwright XML OK")
          PY

      - name: Setup Python
        if: env.TESTRAIL_ENABLED == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install trcli
        if: env.TESTRAIL_ENABLED == 'true'
        run: python -m pip install --upgrade pip trcli

      - name: Upload Playwright report to TestRail
        if: env.TESTRAIL_ENABLED == 'true'
        env:
          TESTRAIL_URL: ${{ secrets.TESTRAIL_URL }}
          TESTRAIL_USER: ${{ secrets.TESTRAIL_USER }}
          TESTRAIL_API_KEY: ${{ secrets.TESTRAIL_API_KEY }}
        run: |
          trcli -y \
            -h "$TESTRAIL_URL" \
            --project "Projekt-Inzynierski-testy" \
            --username "$TESTRAIL_USER" \
            --password "$TESTRAIL_API_KEY" \
            parse_junit \
            --case-matcher "name" \
            --title "Playwright | PR #${{ github.event.pull_request.number }} | Run #${{ github.run_number }}" \
            -f "reports-playwright/junit/results.xml"

  ci-summary:
    runs-on: ubuntu-latest
    needs:
      [
        lint,
        tests-selenium,
        tests-cypress,
        tests-playwright,
        testrail-selenium,
        testrail-cypress,
        testrail-playwright
      ]
    if: always()
    steps:
      - name: Evaluate
        env:
          LINT_RESULT: ${{ needs.lint.result }}
          SELENIUM_RESULT: ${{ needs.tests-selenium.result }}
          CYPRESS_RESULT: ${{ needs.tests-cypress.result }}
          PLAYWRIGHT_RESULT: ${{ needs.tests-playwright.result }}
          TESTRAIL_SELENIUM_RESULT: ${{ needs.testrail-selenium.result }}
          TESTRAIL_CYPRESS_RESULT: ${{ needs.testrail-cypress.result }}
          TESTRAIL_PLAYWRIGHT_RESULT: ${{ needs.testrail-playwright.result }}
        run: |
          set -euo pipefail
          fail=0

          if [[ "$LINT_RESULT" != "success" ]]; then
            echo "lint failed"
            fail=1
          fi

          for result in "$SELENIUM_RESULT" "$CYPRESS_RESULT" "$PLAYWRIGHT_RESULT"; do
            if [[ "$result" != "success" && "$result" != "skipped" ]]; then
              echo "tests failed"
              fail=1
            fi
          done

          for result in "$TESTRAIL_SELENIUM_RESULT" "$TESTRAIL_CYPRESS_RESULT" "$TESTRAIL_PLAYWRIGHT_RESULT"; do
            if [[ "$result" != "success" && "$result" != "skipped" ]]; then
              echo "testrail upload failed"
              fail=1
            fi
          done

          exit $fail