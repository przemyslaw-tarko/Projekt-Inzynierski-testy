x-test-env: &test_env
  BASE_URL: http://wordpress
  TESTRAIL_ENABLED: ${TESTRAIL_ENABLED:-false}
  
services:
  selenium-chrome:
    image: selenium/standalone-chrome:4.16.1
    shm_size: "2gb"
    environment:
      SE_NODE_SESSION_TIMEOUT: 300
    ports:
      - "4444:4444"
    networks:
      - wpsite
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4444/status"]
      interval: 30s
      timeout: 10s
      retries: 12
      start_period: 30s

  selenium-tests:
    image: compar-selenium-tests:latest
    build:
      context: .
      dockerfile: tests/selenium/Dockerfile
    depends_on:
      wordpress:
        condition: service_healthy
      selenium-chrome:
        condition: service_healthy
    environment:
      <<: *test_env
      SELENIUM_REMOTE_URL: http://selenium-chrome:4444
    volumes:
      - ./reports:/work/reports
    networks:
      - wpsite
    command: ["npm", "run", "test"]

  cypress-tests:
    image: compar-cypress-tests:latest
    build:
      context: .
      dockerfile: tests/cypress/Dockerfile
    environment:
      <<: *test_env
    depends_on:
      wordpress:
        condition: service_healthy
    volumes:
      - ./reports:/work/reports
    networks:
      - wpsite
    command: ["npm", "run", "test"]

  playwright-tests:
    image: compar-playwright-tests:latest
    build:
      context: .
      dockerfile: tests/playwright/Dockerfile
    environment:
      <<: *test_env
    depends_on:
      wordpress:
        condition: service_healthy
    volumes:
      - ./reports:/work/reports
    networks:
      - wpsite
    command: ["npm", "run", "test"]

networks:
  wpsite: {}
