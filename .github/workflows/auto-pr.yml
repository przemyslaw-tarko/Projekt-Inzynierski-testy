name: Auto PR

on:
  push:
    branches-ignore:
      - main

permissions:
  contents: read
  pull-requests: write

jobs:
  create-pr:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create PR if missing
        env:
          GH_TOKEN: ${{ secrets.AUTO_PR_TOKEN || secrets.GITHUB_TOKEN }}
          BRANCH: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          if gh pr view "$BRANCH" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "PR already exists for branch $BRANCH"
            exit 0
          fi
          set +e
          output=$(gh pr create \
            --repo "$GITHUB_REPOSITORY" \
            --base main \
            --head "$BRANCH" \
            --title "Auto PR: $BRANCH" \
            --body "Automated PR created from push." 2>&1)
          status=$?
          set -e
          if [[ $status -ne 0 ]]; then
            if echo "$output" | grep -qi "already exists"; then
              echo "$output"
              exit 0
            fi
            echo "$output"
            exit "$status"
          fi
          echo "$output"
